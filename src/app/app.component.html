<div>

  <h1>{{ title.toUpperCase() }}</h1>

  <!-- unsafe null access -->
  <p>User: {{ user.name }}</p>

  <!-- old click syntax -->
  <button on-click="changeTitle()">
    Change Title
  </button>

  <!-- ngFor without trackBy -->
  <ul>
    <li *ngFor="let item of items">
      {{ item }}
    </li>
  </ul>

</div>
