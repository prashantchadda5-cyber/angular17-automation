<div class="container">
  <h2>{{ title.toUpperCase() }}</h2>

  <input [(ngModel)]="username" />

  <button (click)="submitForm()">Submit</button>

  <p>Total Users: {{ users.length }}</p>

  <div *ngIf="isLoggedIn">
    Logged In!
  </div>

  <ul>
    <li *ngFor="let user of users; trackBy: trackById">
      {{ user.name }}
    </li>
  </ul>
</div>
